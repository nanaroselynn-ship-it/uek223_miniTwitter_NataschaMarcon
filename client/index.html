<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <script defer src="/client.js"></script>
    <title>MiniTwitter</title>
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <h1>🐣 MiniTwitter 🐣</h1>
        <p>🍓 Lets discuss! 🍓</p>
      </header>

      <main class="layout">
        <div id="auth-view" class="view active-view">
          <section class="panel">
            <h2>Registrieren</h2>
            <form id="register-form" class="form">
              <input id="register-username" type="text" placeholder="Benutzername" required />
              <input id="register-password" type="password" placeholder="Passwort" required />
              <button type="submit">Registrieren</button>
            </form>
          </section>

          <section class="panel">
            <h2>Login</h2>
            <form id="login-form" class="form">
              <input id="login-username" type="text" placeholder="Benutzername" required />
              <input id="login-password" type="password" placeholder="Passwort" required />
              <button type="submit">Einloggen</button>
            </form>
          </section>
        </div>

        <div id="app-view" class="view hidden-view">
          <section class="panel">
            <h2>Aktueller User</h2>
            <p id="current-user">Nicht eingeloggt</p>
            <button id="logout-btn" type="button">Logout</button>
          </section>

          <section class="panel panel-wide">
            <h2>Neuen Beitrag erstellen</h2>
            <form id="post-form" class="form">
              <textarea id="post-content" placeholder="Was wosch verzeu?" required></textarea>
              <button type="submit">Beitrag posten</button>
            </form>
          </section>

          <section class="panel panel-wide">
            <div class="feed-header">
              <h2>Feed</h2>
              <button id="load-posts-btn" type="button">Feed aktualisieren</button>
            </div>
            <div id="posts" class="posts"></div>
          </section>
        </div>

        <section class="panel panel-wide">
          <h2>Status</h2>
          <p id="status-message">Bereit</p>
        </section>
      </main>
    </div>
  </body>
</html>
